name: Deploy on Release Tag

on:
  push:
    tags:
      - "v*"

# Parallele Jobs: Vercel- und Railway-Deploy unabhängig sichtbar.
# Vercel: `vercel pull` / `vercel build` / `vercel deploy` immer vom **Repo-Root** ausführen,
# wenn im Vercel-Dashboard „Root Directory“ = `web` gesetzt ist. Sonst verdoppelt die CLI
# den Pfad (`web/web`) → `Error: spawn sh ENOENT` beim Build (siehe Actions-Logs).

jobs:
  vercel:
    name: Deploy Vercel (prebuilt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel Secrets fehlen: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel CLI
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  railway:
    name: Deploy Railway (CLI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install --global @railway/cli@latest

      - name: Deploy to Railway with CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_NAME: ${{ secrets.RAILWAY_SERVICE_NAME }}
          RAILWAY_ENVIRONMENT_NAME: ${{ secrets.RAILWAY_ENVIRONMENT_NAME }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE_NAME" ] || [ -z "$RAILWAY_ENVIRONMENT_NAME" ]; then
            echo "Railway Secrets fehlen: RAILWAY_TOKEN, RAILWAY_SERVICE_NAME, RAILWAY_ENVIRONMENT_NAME"
            exit 1
          fi
          # Kein `railway up .`: explizites `.` kann gegenüber dem verlinkten Projekt-Prefix
          # zu `prefix not found` führen (CLI strip_prefix), siehe railwayapp/cli#595.
          railway up --service="$RAILWAY_SERVICE_NAME" --environment="$RAILWAY_ENVIRONMENT_NAME" --ci
