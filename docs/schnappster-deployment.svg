<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img">
  <title>Schnappster Deployment</title>
  <desc>Bei Git-Release-Tag startet GitHub Actions drei parallele Deployments: Vercel f&#252;r das Web-Frontend, Railway f&#252;r Backend (FastAPI, Scraping, KI) und Railway f&#252;r den MCP-Server.</desc>
  <defs>
    <linearGradient id="dep-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="55%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#ececee"/>
    </linearGradient>
    <filter id="dep-sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="dep-a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#3f3f46"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="url(#dep-bg)"/>

  <text x="450" y="46" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="600" letter-spacing="-0.03em" fill="#18181b">Schnappster</text>
  <text x="450" y="72" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#71717a">Deployment</text>

  <!-- Trigger -->
  <rect x="352" y="104" width="196" height="34" rx="17" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.25" filter="url(#dep-sh)"/>
  <text x="450" y="126" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#3f3f46">Release-Tag (v*)</text>

  <!-- GitHub Actions -->
  <g filter="url(#dep-sh)">
    <rect x="285" y="168" width="330" height="64" rx="14" fill="#ffffff" stroke="#24292f" stroke-width="1.5"/>
    <text x="450" y="198" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#24292f">GitHub Actions</text>
    <text x="450" y="218" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" fill="#71717a">parallele Jobs</text>
  </g>

  <!-- Connectors -->
  <path d="M 450 138 L 450 168" fill="none" stroke="#52525b" stroke-width="1.5" marker-end="url(#dep-a)"/>
  <path d="M 285 200 L 172 300" fill="none" stroke="#52525b" stroke-width="1.5" marker-end="url(#dep-a)"/>
  <path d="M 615 200 L 728 300" fill="none" stroke="#52525b" stroke-width="1.5" marker-end="url(#dep-a)"/>
  <path d="M 450 232 L 450 300" fill="none" stroke="#52525b" stroke-width="1.5" marker-end="url(#dep-a)"/>

  <!-- Vercel -->
  <g filter="url(#dep-sh)">
    <rect x="38" y="300" width="268" height="116" rx="16" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/>
    <text x="172" y="334" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#18181b">Vercel</text>
    <text x="172" y="358" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#52525b">Web-Frontend</text>
    <text x="172" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#18181b">🔗 https://schnappster.henrikheil.net</text>
  </g>

  <!-- Railway API -->
  <g filter="url(#dep-sh)">
    <rect x="316" y="300" width="268" height="116" rx="16" fill="#ffffff" stroke="#5b21b6" stroke-width="1.5"/>
    <text x="450" y="334" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#5b21b6">Railway</text>
    <text x="450" y="358" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#52525b">Backend (FastAPI + Scraping + KI)</text>
    <text x="450" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#18181b">🔗 https://api.schnappster.henrikheil.net</text>
  </g>

  <!-- Railway MCP -->
  <g filter="url(#dep-sh)">
    <rect x="594" y="300" width="268" height="116" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="728" y="334" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6d28d9">Railway</text>
    <text x="728" y="358" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#52525b">MCP-Server</text>
    <text x="728" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#18181b">🔗 https://mcp.schnappster.henrikheil.net</text>
  </g>

</svg>
