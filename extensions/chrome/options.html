<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schnappster – Einstellungen</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      max-width: 400px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      padding: 8px 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1557b0;
    }
    .hint {
      font-size: 12px;
      color: #5f6368;
      margin-top: -8px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>Schnappster</h1>
  <p class="hint">Einstellungen für die Browser-Erweiterung</p>
  <label for="baseUrl">Base-URL des Schnappster-Backends</label>
  <input type="url" id="baseUrl" placeholder="http://localhost:8000" />
  <p class="hint">Ohne abschließenden Schrägstrich. Standard: http://localhost:8000</p>
  <button type="button" id="save">Speichern</button>
  <span id="status" style="margin-left: 8px; font-size: 14px;"></span>
  <script src="options.js"></script>
</body>
</html>
