<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schnappster – Einstellungen</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      max-width: 400px;
    }
    h1 { margin-bottom: 4px; }
    h2 { font-size: 14px; margin: 20px 0 8px; }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      padding: 8px 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    button.secondary { background: #e8eaed; color: #202124; }
    button.secondary:hover { background: #dadce0; }
    .hint {
      font-size: 12px;
      color: #5f6368;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .status { margin-left: 8px; font-size: 14px; }
    .row { display: flex; align-items: center; gap: 8px; }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 20px 0; }
    #loggedIn { display: none; }
  </style>
</head>
<body>
  <h1>Schnappster</h1>
  <p class="hint">Einstellungen für die Browser-Erweiterung</p>

  <label for="baseUrl">Base-URL des Schnappster-Backends</label>
  <input type="url" id="baseUrl" placeholder="http://localhost:8000" />
  <p class="hint">Ohne abschließenden Schrägstrich. Standard: http://localhost:8000</p>
  <button type="button" id="save">Base-URL speichern</button>
  <span id="baseStatus" class="status"></span>

  <hr />

  <h2>Anmeldung</h2>
  <div id="loggedOut">
    <p class="hint">Mit deinem Schnappster-Konto anmelden. Es wird nur ein Zugriffs-Token gespeichert, nicht dein Passwort.</p>
    <label for="email">E-Mail</label>
    <input type="email" id="email" autocomplete="username" placeholder="du@example.com" />
    <label for="password">Passwort</label>
    <input type="password" id="password" autocomplete="current-password" />
    <div class="row">
      <button type="button" id="login">Anmelden</button>
      <span id="loginStatus" class="status"></span>
    </div>
  </div>
  <div id="loggedIn">
    <p>Angemeldet als <strong id="userEmail"></strong>.</p>
    <button type="button" id="logout" class="secondary">Abmelden</button>
  </div>

  <script src="options.js"></script>
</body>
</html>
